<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Sky Shooter - 银河天空射击</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 854px;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 50%, #0d1b2a 100%);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(100, 50, 200, 0.3);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .score {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            z-index: 10;
        }

        .health {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff4444;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff4444, 0 0 20px #ff4444;
            z-index: 10;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            color: #00ffff;
            font-size: 48px;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            margin-bottom: 20px;
            text-align: center;
        }

        h2 {
            color: #ff4444;
            font-size: 36px;
            text-shadow: 0 0 20px #ff4444, 0 0 40px #ff4444;
            margin-bottom: 20px;
        }

        .subtitle {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 40px;
            text-align: center;
        }

        .btn {
            padding: 15px 50px;
            font-size: 24px;
            background: linear-gradient(45deg, #00a8ff, #00ffff);
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #666, #999);
            box-shadow: 0 0 20px rgba(150, 150, 150, 0.5);
        }

        .btn-secondary:hover {
            box-shadow: 0 0 40px rgba(150, 150, 150, 0.8);
        }

        .highscore-display {
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            border-radius: 25px;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            text-align: center;
        }

        .highscore-label {
            font-size: 14px;
            color: #664400;
            margin-bottom: 5px;
        }

        .highscore-value {
            font-size: 28px;
            color: #000;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .final-score {
            color: #fff;
            font-size: 28px;
            margin-bottom: 30px;
        }

        .instructions {
            color: #888;
            font-size: 14px;
            margin-top: 30px;
            text-align: center;
            line-height: 1.6;
        }

        .touch-hint {
            color: #666;
            font-size: 12px;
            margin-top: 15px;
            text-align: center;
        }

        /* 移动端触摸优化 */
        @media (pointer: coarse) {
            #gameCanvas {
                touch-action: none;
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                user-select: none;
            }
        }

        #exitBtn {
            position: absolute;
            top: 60px;
            right: 20px;
            padding: 8px 16px;
            font-size: 14px;
            background: linear-gradient(45deg, #ff4444, #ff6666);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
            z-index: 50;
            display: none;
        }

        #exitBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.8);
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            h1 { font-size: 36px; }
            h2 { font-size: 28px; }
            .btn { font-size: 20px; padding: 12px 40px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="score">SCORE: <span id="scoreValue">0</span></div>
            <div class="health">❤️ <span id="healthValue">3</span></div>
        </div>
        
        <div id="startScreen">
            <h1>🚀 GALAXY<br>SKY SHOOTER</h1>
            <div class="subtitle">银河天空射击</div>
            <button class="btn" onclick="startGame()">START GAME</button>
            <div class="highscore-display">
                <div class="highscore-label">🏆 HIGHEST SCORE</div>
                <div class="highscore-value" id="highScoreValue">0</div>
            </div>
            <div class="instructions">
                键盘方向键 ↑↓←→ 或 WASD 控制战机移动<br>
                自动射击，躲避敌机！
            </div>
            <div class="touch-hint">
                📱 手机端：触摸并拖动屏幕控制战机
            </div>
        </div>
        
        <div id="gameOverScreen">
            <h2>GAME OVER</h2>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <button class="btn" onclick="restartGame()">RESTART</button>
            <button class="btn btn-secondary" onclick="goToHome()">HOME</button>
        </div>
        
        <button id="exitBtn" onclick="exitGame()">EXIT</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
